<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>뽀모도로 타이머</title>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: transparent;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
        }

        .widget-container {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
        }

        .pomodoro-card {
            width: 100%;
            max-width: 600px;
            min-height: 200px;
            background: #FFFFFF;
            border: 1px solid #E5E8EB;
            border-radius: 16px;
            padding: 24px 32px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            position: relative;
        }

        .top-section {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            margin-bottom: 14px;
        }

        .clock-icon {
            font-size: 26px;
            line-height: 1;
            animation: tick 1s ease-in-out infinite;
        }

        @keyframes tick {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-8deg); }
            75% { transform: rotate(8deg); }
        }

        .clock-icon.paused {
            animation: none;
        }

        .round-badge {
            position: absolute;
            left: 0;
            font-size: 12px;
            color: #8B95A1;
            font-weight: 500;
            letter-spacing: -0.2px;
        }

        .round-badge .round-num {
            color: #3182F6;
            font-weight: 700;
        }

        .controls {
            position: absolute;
            right: 0;
            display: flex;
            gap: 6px;
        }

        .control-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: rgba(49, 130, 246, 0.08);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .control-btn:hover {
            background: rgba(49, 130, 246, 0.15);
            transform: scale(1.05);
        }

        .control-btn svg {
            width: 14px;
            height: 14px;
            stroke: #3182F6;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .control-btn.play svg {
            fill: #3182F6;
            stroke: #3182F6;
        }

        .progress-container {
            width: 100%;
            margin-bottom: 16px;
        }

        .progress-track {
            width: 100%;
            height: 6px;
            background: #F2F4F6;
            border-radius: 100px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #3182F6;
            border-radius: 100px;
            transition: width 0.5s linear;
            width: 0%;
        }

        .progress-fill.break {
            background: #20C997;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .time-block {
            flex: 1;
            padding: 10px;
            border-radius: 12px;
            background: #F9FAFB;
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
        }

        .time-block.active {
            background: #E8F2FF;
        }

        .time-block.active.break {
            background: #E6F9F3;
        }

        .time-label {
            font-size: 12px;
            font-weight: 500;
            color: #8B95A1;
            margin-bottom: 4px;
            letter-spacing: -0.2px;
        }

        .time-block.active .time-label {
            color: #3182F6;
        }

        .time-block.active.break .time-label {
            color: #12B886;
        }

        .time-control {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .time-adjust-btn {
            width: 22px;
            height: 22px;
            border: 1px solid #E5E8EB;
            background: #FFFFFF;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            color: #4E5968;
            transition: all 0.15s ease;
            padding: 0;
            line-height: 1;
        }

        .time-adjust-btn:hover:not(:disabled) {
            background: #F9FAFB;
            border-color: #3182F6;
            color: #3182F6;
        }

        .time-adjust-btn:active:not(:disabled) {
            transform: scale(0.92);
        }

        .time-adjust-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .time-value {
            font-size: 22px;
            font-weight: 700;
            color: #191F28;
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.5px;
            min-width: 70px;
        }

        @media (max-width: 480px) {
            .pomodoro-card {
                padding: 20px 18px;
            }
            .time-value {
                font-size: 18px;
                min-width: 56px;
            }
            .time-adjust-btn {
                width: 20px;
                height: 20px;
                font-size: 12px;
            }
            .clock-icon {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="widget-container">
        <div class="pomodoro-card">
            <div class="top-section">
                <div class="round-badge">
                    <span class="round-num" id="roundNum">1</span> 라운드
                </div>
                <div class="clock-icon paused" id="clockIcon">⏰</div>
                <div class="controls">
                    <button class="control-btn play" id="playBtn" onclick="toggleTimer()" aria-label="시작/일시정지">
                        <svg id="playIcon" viewBox="0 0 24 24">
                            <polygon points="6 4 20 12 6 20 6 4"/>
                        </svg>
                    </button>
                    <button class="control-btn" onclick="resetTimer()" aria-label="초기화">
                        <svg viewBox="0 0 24 24">
                            <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
                            <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
                            <path d="M21 3v5h-5"/>
                            <path d="M3 21v-5h5"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="progress-container">
                <div class="progress-track">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>

            <div class="time-info">
                <div class="time-block active" id="focusBlock">
                    <div class="time-label">집중할 시간</div>
                    <div class="time-control">
                        <button class="time-adjust-btn" onclick="adjustTime('focus', -5)" id="focusMinus" aria-label="집중 시간 감소">−</button>
                        <div class="time-value" id="focusTime">25:00</div>
                        <button class="time-adjust-btn" onclick="adjustTime('focus', 5)" id="focusPlus" aria-label="집중 시간 증가">+</button>
                    </div>
                </div>
                <div class="time-block" id="breakBlock">
                    <div class="time-label">쉬는 시간</div>
                    <div class="time-control">
                        <button class="time-adjust-btn" onclick="adjustTime('break', -1)" id="breakMinus" aria-label="쉬는 시간 감소">−</button>
                        <div class="time-value" id="breakTime">05:00</div>
                        <button class="time-adjust-btn" onclick="adjustTime('break', 1)" id="breakPlus" aria-label="쉬는 시간 증가">+</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let focusMinutes = 25;
        let breakMinutes = 5;
        const FOCUS_MIN = 5;
        const FOCUS_MAX = 90;
        const BREAK_MIN = 1;
        const BREAK_MAX = 30;

        let currentMode = 'focus';
        let timeRemaining = focusMinutes * 60;
        let isRunning = false;
        let intervalId = null;
        let roundCount = 1;

        const focusTimeEl = document.getElementById('focusTime');
        const breakTimeEl = document.getElementById('breakTime');
        const progressFillEl = document.getElementById('progressFill');
        const playIcon = document.getElementById('playIcon');
        const clockIcon = document.getElementById('clockIcon');
        const focusBlock = document.getElementById('focusBlock');
        const breakBlock = document.getElementById('breakBlock');
        const roundNumEl = document.getElementById('roundNum');
        const focusMinusBtn = document.getElementById('focusMinus');
        const focusPlusBtn = document.getElementById('focusPlus');
        const breakMinusBtn = document.getElementById('breakMinus');
        const breakPlusBtn = document.getElementById('breakPlus');

        let audioContext = null;

        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }
        }

        function playSound(type) {
            if (!audioContext) return;
            const now = audioContext.currentTime;

            if (type === 'start') {
                playTone(523, now, 0.1);
                playTone(659, now + 0.1, 0.1);
            } else if (type === 'pause') {
                playTone(440, now, 0.15);
            } else if (type === 'complete-focus') {
                playTone(523, now, 0.15);
                playTone(659, now + 0.15, 0.15);
                playTone(784, now + 0.3, 0.4);
                playTone(1047, now + 0.7, 0.5);
            } else if (type === 'complete-break') {
                playTone(784, now, 0.15);
                playTone(659, now + 0.15, 0.15);
                playTone(523, now + 0.3, 0.4);
                playTone(392, now + 0.7, 0.5);
            }
        }

        function playTone(frequency, startTime, duration) {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.frequency.value = frequency;
            oscillator.type = 'sine';

            gainNode.gain.setValueAtTime(0, startTime);
            gainNode.gain.linearRampToValueAtTime(0.15, startTime + 0.01);
            gainNode.gain.exponentialRampToValueAtTime(0.001, startTime + duration);

            oscillator.start(startTime);
            oscillator.stop(startTime + duration);
        }

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        }

        function updateDisplay() {
            const totalDuration = currentMode === 'focus' ? focusMinutes * 60 : breakMinutes * 60;
            const progress = ((totalDuration - timeRemaining) / totalDuration) * 100;

            if (currentMode === 'focus') {
                focusTimeEl.textContent = formatTime(timeRemaining);
                breakTimeEl.textContent = formatTime(breakMinutes * 60);
                progressFillEl.classList.remove('break');
                focusBlock.classList.add('active');
                focusBlock.classList.remove('break');
                breakBlock.classList.remove('active', 'break');
            } else {
                focusTimeEl.textContent = formatTime(focusMinutes * 60);
                breakTimeEl.textContent = formatTime(timeRemaining);
                progressFillEl.classList.add('break');
                breakBlock.classList.add('active', 'break');
                focusBlock.classList.remove('active');
            }

            progressFillEl.style.width = `${progress}%`;
            roundNumEl.textContent = roundCount;
            updateAdjustButtons();
        }

        function updateAdjustButtons() {
            const disabled = isRunning;
            focusMinusBtn.disabled = disabled || focusMinutes <= FOCUS_MIN;
            focusPlusBtn.disabled = disabled || focusMinutes >= FOCUS_MAX;
            breakMinusBtn.disabled = disabled || breakMinutes <= BREAK_MIN;
            breakPlusBtn.disabled = disabled || breakMinutes >= BREAK_MAX;
        }

        function adjustTime(type, delta) {
            if (isRunning) return;

            if (type === 'focus') {
                const newValue = focusMinutes + delta;
                if (newValue >= FOCUS_MIN && newValue <= FOCUS_MAX) {
                    focusMinutes = newValue;
                    if (currentMode === 'focus') {
                        timeRemaining = focusMinutes * 60;
                    }
                }
            } else {
                const newValue = breakMinutes + delta;
                if (newValue >= BREAK_MIN && newValue <= BREAK_MAX) {
                    breakMinutes = newValue;
                    if (currentMode === 'break') {
                        timeRemaining = breakMinutes * 60;
                    }
                }
            }
            updateDisplay();
        }

        function startInterval() {
            intervalId = setInterval(() => {
                timeRemaining--;
                updateDisplay();
                if (timeRemaining <= 0) {
                    completeSession();
                }
            }, 1000);
        }

        function toggleTimer() {
            initAudio();
            if (isRunning) {
                pauseTimer();
            } else {
                startTimer();
            }
        }

        function startTimer() {
            isRunning = true;
            clockIcon.classList.remove('paused');
            playSound('start');

            playIcon.innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';

            startInterval();
            updateAdjustButtons();
        }

        function pauseTimer() {
            isRunning = false;
            clockIcon.classList.add('paused');
            clearInterval(intervalId);
            playSound('pause');

            playIcon.innerHTML = '<polygon points="6 4 20 12 6 20 6 4"/>';
            updateAdjustButtons();
        }

        function completeSession() {
            clearInterval(intervalId);

            if (currentMode === 'focus') {
                playSound('complete-focus');
                currentMode = 'break';
                timeRemaining = breakMinutes * 60;
            } else {
                playSound('complete-break');
                currentMode = 'focus';
                timeRemaining = focusMinutes * 60;
                roundCount++;
            }

            updateDisplay();

            setTimeout(() => {
                if (isRunning) {
                    startInterval();
                }
            }, 1500);
        }

        function resetTimer() {
            initAudio();
            clearInterval(intervalId);
            isRunning = false;
            currentMode = 'focus';
            timeRemaining = focusMinutes * 60;
            roundCount = 1;
            clockIcon.classList.add('paused');
            playIcon.innerHTML = '<polygon points="6 4 20 12 6 20 6 4"/>';
            updateDisplay();
        }

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                toggleTimer();
            }
        });

        updateDisplay();
    </script>
</body>
</html>
